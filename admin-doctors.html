<!DOCTYPE html>
<html lang="en" class="light"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manage Doctors | CareSync</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
<link href="assets/css/styles.css" rel="stylesheet"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#005c55","background":"#f7faf8","surface-container-low":"#f1f4f3","on-surface":"#181c1c","on-surface-variant":"#3e4947","outline":"#6e7977","outline-variant":"#bdc9c6"},borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem"},spacing:{"container-padding":"24px","gutter":"16px"},fontFamily:{h1:["Inter"],"label-caps":["Inter"]},fontSize:{h1:["24px",{lineHeight:"1.3",fontWeight:"600"}],"label-caps":["12px",{lineHeight:"1",letterSpacing:"0.05em",fontWeight:"600"}]}}}}</script>
</head>
<body class="bg-background text-on-surface">
<header class="cs-header"><div id="cs-header-inner" style="display:flex;align-items:center;gap:12px;width:100%"></div></header>
<div style="display:flex;min-height:100dvh;padding-top:64px">
<aside class="cs-sidebar" id="cs-sidebar"></aside>
<div id="sidebar-overlay" onclick="document.getElementById('cs-sidebar').classList.remove('open');this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:35"></div>
<main class="cs-main">

  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px" data-aos="fade-up">
    <div>
      <h1 class="cs-page-title">Manage Doctors</h1>
      <p class="cs-page-subtitle">Add, edit and remove doctor records.</p>
    </div>
    <button class="cs-btn cs-btn-primary" onclick="openDoctorModal()">
      <span class="material-symbols-outlined" style="font-size:18px">person_add</span> Add Doctor
    </button>
  </div>

  <div class="cs-card" style="padding:0" data-aos="fade-up" data-aos-delay="50">
    <div style="display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid #f1f4f3;flex-wrap:wrap">
      <div class="cs-input-icon" style="max-width:320px;flex:1">
        <span class="material-symbols-outlined icon">search</span>
        <input class="cs-input" id="search-input" type="search" placeholder="Search by name or specialisation…" style="background:#f1f4f3"/>
      </div>
    </div>

    <div class="cs-table-wrapper" style="border:none;border-radius:0" id="doctors-table">
      <table class="cs-table">
        <thead>
          <tr>
            <th>Doctor</th>
            <th>Specialisation</th>
            <th>Qualification</th>
            <th>Contact</th>
            <th>License</th>
            <th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div id="doctors-pagination"></div>
  </div>

</main></div>
<div id="cs-toast-container"></div>
<script src="assets/js/app.js"></script>
<script src="assets/js/demo-seed.js"></script>
<script src="assets/js/admin.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="assets/js/aos-init.js"></script>
<script>
if (!guardRoute(['Admin'])) throw new Error('Unauthorized');
DarkMode.init();
initDashboardPage({ role:'Admin', activePage:'admin-doctors.html' });
document.getElementById('sidebar-toggle')?.addEventListener('click',()=>{
  const s=document.getElementById('cs-sidebar'),o=document.getElementById('sidebar-overlay');
  s.classList.toggle('open');o.style.display=s.classList.contains('open')?'block':'none';
});
const tableCtrl = buildTablePage({
  containerId:'doctors-table',paginationId:'doctors-pagination',columns:6,
  searchFields:['name','specialisation'],
  getData:()=>Store.get(KEYS.DOCTORS),
  renderRow(d,q){
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px">${avatarEl(d.name,36)}<p style="font-weight:600;font-size:14px">${highlightText(d.name,q)}</p></div></td>
      <td><span style="background:#e8f7f5;color:#005c55;padding:3px 10px;border-radius:9999px;font-size:12px;font-weight:600">${highlightText(d.specialisation,q)}</span></td>
      <td style="font-size:13px;color:#3e4947">${escHtml(d.qualification||'—')}</td>
      <td style="font-size:13px;color:#3e4947">${escHtml(d.contact||'—')}</td>
      <td style="font-size:12px;color:#6e7977">${escHtml(d.licenseNumber||'—')}</td>
      <td style="text-align:right"><div style="display:flex;gap:4px;justify-content:flex-end">
        <button class="cs-btn-icon" title="Edit" onclick="openDoctorModal(${JSON.stringify(d).replace(/"/g,'&quot;')})"><span class="material-symbols-outlined" style="font-size:18px">edit</span></button>
        <button class="cs-btn-icon" title="Delete" onclick="deleteDoctor('${d.id}')" style="color:#ba1a1a"><span class="material-symbols-outlined" style="font-size:18px">delete</span></button>
      </div></td>
    </tr>`;
  }
});
window._tableRefresh = () => tableCtrl.refresh();
</script>
<style>html.dark body{background:#0f1a19}html.dark .cs-main{background:#0f1a19!important}</style>
</body></html>
