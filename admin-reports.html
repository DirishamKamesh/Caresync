<!DOCTYPE html>
<html lang="en" class="light"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reports & Audit | CareSync Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
<link href="assets/css/styles.css" rel="stylesheet"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#005c55","background":"#f7faf8","surface-container-low":"#f1f4f3","on-surface":"#181c1c","on-surface-variant":"#3e4947","outline":"#6e7977"},borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem"},fontFamily:{h1:["Inter"]},fontSize:{h1:["24px",{lineHeight:"1.3",fontWeight:"600"}]}}}}</script>
</head>
<body class="bg-background text-on-surface">
<header class="cs-header"><div id="cs-header-inner" style="display:flex;align-items:center;gap:12px;width:100%"></div></header>
<div style="display:flex;min-height:100dvh;padding-top:64px">
<aside class="cs-sidebar" id="cs-sidebar"></aside>
<div id="sidebar-overlay" onclick="document.getElementById('cs-sidebar').classList.remove('open');this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:35"></div>
<main class="cs-main">

  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px" data-aos="fade-up">
    <div>
      <h1 class="cs-page-title">Reports & Audit Log</h1>
      <p class="cs-page-subtitle">System statistics, charts, and complete audit trail.</p>
    </div>
    <div style="display:flex;gap:10px">
      <button class="cs-btn cs-btn-outline cs-btn-sm" onclick="exportData()">
        <span class="material-symbols-outlined" style="font-size:16px">download</span> Export JSON
      </button>
      <button class="cs-btn cs-btn-outline cs-btn-sm" onclick="document.getElementById('import-file').click()">
        <span class="material-symbols-outlined" style="font-size:16px">upload</span> Import JSON
      </button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)"/>
    </div>
  </div>

  <!-- Charts Row -->
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px" data-aos="fade-up" data-aos-delay="50">
    <div class="cs-card">
      <h2 style="font-size:17px;font-weight:700;margin-bottom:18px">Appointments — Last 7 Days</h2>
      <canvas id="chart-bar" height="180"></canvas>
    </div>
    <div class="cs-card">
      <h2 style="font-size:17px;font-weight:700;margin-bottom:18px">Status Breakdown</h2>
      <canvas id="chart-doughnut" height="180"></canvas>
      <div id="doughnut-legend" style="margin-top:14px;display:flex;flex-direction:column;gap:7px;font-size:12px"></div>
    </div>
  </div>

  <!-- Audit Log -->
  <div class="cs-card" style="padding:0" data-aos="fade-up" data-aos-delay="100">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:18px 20px;border-bottom:1px solid #f1f4f3">
      <h2 style="font-size:17px;font-weight:700">Audit Log</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <div class="cs-input-icon" style="max-width:240px">
          <span class="material-symbols-outlined icon">search</span>
          <input class="cs-input" id="audit-search" type="search" placeholder="Search action or user…" style="background:#f1f4f3" oninput="renderAuditLog()"/>
        </div>
        <select class="cs-select" id="audit-role-filter" style="width:130px;padding:8px 12px" onchange="renderAuditLog()">
          <option value="">All roles</option>
          <option value="Admin">Admin</option>
          <option value="Doctor">Doctor</option>
          <option value="Patient">Patient</option>
        </select>
      </div>
    </div>
    <div id="audit-table-wrapper" class="cs-table-wrapper" style="border:none;border-radius:0">
      <table class="cs-table">
        <thead><tr><th>Timestamp</th><th>Actor</th><th>Role</th><th>Action</th><th>Entity</th><th>Details</th></tr></thead>
        <tbody id="audit-tbody"></tbody>
      </table>
    </div>
    <div id="audit-pagination"></div>
  </div>

</main></div>
<div id="cs-toast-container"></div>
<script src="assets/js/app.js"></script>
<script src="assets/js/demo-seed.js"></script>
<script src="assets/js/admin.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="assets/js/aos-init.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="assets/js/charts.js"></script>
<script>
if (!guardRoute(['Admin'])) throw new Error('Unauthorized');
DarkMode.init();
initDashboardPage({ role:'Admin', activePage:'admin-reports.html' });
document.getElementById('sidebar-toggle')?.addEventListener('click',()=>{
  const s=document.getElementById('cs-sidebar'),o=document.getElementById('sidebar-overlay');
  s.classList.toggle('open');o.style.display=s.classList.contains('open')?'block':'none';
});

const apts = Store.get(KEYS.APPOINTMENTS);
if (window.initCharts) initCharts(apts);

let auditPage = 1;
function renderAuditLog() {
  const q    = document.getElementById('audit-search').value.toLowerCase();
  const role = document.getElementById('audit-role-filter').value;
  let logs   = Store.get(KEYS.AUDIT_LOGS);
  if (q) logs = logs.filter(l => l.action.toLowerCase().includes(q) || l.actor_username.toLowerCase().includes(q) || (l.details||'').toLowerCase().includes(q));
  if (role) logs = logs.filter(l => l.actor_role === role);

  const pag = paginate(logs, auditPage, 10);
  const tbody = document.getElementById('audit-tbody');
  const roleColors = { Admin:'#831843', Doctor:'#312e81', Patient:'#064e3b' };
  const roleBg = { Admin:'#fce7f3', Doctor:'#e0e7ff', Patient:'#d1fae5' };

  if (pag.items.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="cs-empty"><span class="material-symbols-outlined">receipt_long</span>No audit entries found</div></td></tr>`;
  } else {
    tbody.innerHTML = pag.items.map(l => `<tr>
      <td style="font-size:12px;color:#6e7977;white-space:nowrap">${fmtDateTime(l.timestamp)}</td>
      <td style="font-size:13px;font-weight:600">${escHtml(l.actor_username)}</td>
      <td><span style="background:${roleBg[l.actor_role]||'#f1f4f3'};color:${roleColors[l.actor_role]||'#181c1c'};padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:700">${escHtml(l.actor_role)}</span></td>
      <td><code style="font-size:11px;background:#f1f4f3;padding:2px 7px;border-radius:4px;color:#005c55">${escHtml(l.action)}</code></td>
      <td style="font-size:12px;color:#3e4947">${escHtml(l.entity_type)}</td>
      <td style="font-size:12px;color:#6e7977;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(l.details||'—')}</td>
    </tr>`).join('');
  }
  renderPaginationControls(document.getElementById('audit-pagination'), pag, p => { auditPage = p; renderAuditLog(); });
}
renderAuditLog();

// Export / Import
function exportData() {
  const data = {};
  Object.entries(KEYS).forEach(([k,v]) => { if(v !== KEYS.SESSION) data[v] = Store.get(v); });
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `caresync-backup-${Date.now()}.json`;
  a.click();
  showToast('Data exported successfully', 'success');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, JSON.stringify(v)));
      showToast('Data imported successfully! Reloading…', 'success');
      setTimeout(() => location.reload(), 1200);
    } catch { showToast('Invalid JSON file', 'error'); }
  };
  reader.readAsText(file);
  input.value = '';
}
</script>
<style>
@media(max-width:900px){main>div:nth-child(2){grid-template-columns:1fr!important}}
html.dark body{background:#0f1a19}html.dark .cs-main{background:#0f1a19!important}
</style>
</body></html>
