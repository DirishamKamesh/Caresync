<!DOCTYPE html>
<html lang="en" class="light"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Doctor Dashboard | CareSync</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
<link href="assets/css/styles.css" rel="stylesheet"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#005c55","background":"#f7faf8","surface-container-low":"#f1f4f3","on-surface":"#181c1c","on-surface-variant":"#3e4947","outline":"#6e7977"},borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem"},fontFamily:{h1:["Inter"]},fontSize:{h1:["24px",{lineHeight:"1.3",fontWeight:"600"}]}}}}</script>
</head>
<body class="bg-background text-on-surface">
<header class="cs-header"><div id="cs-header-inner" style="display:flex;align-items:center;gap:12px;width:100%"></div></header>
<div style="display:flex;min-height:100dvh;padding-top:64px">
<aside class="cs-sidebar" id="cs-sidebar"></aside>
<div id="sidebar-overlay" onclick="document.getElementById('cs-sidebar').classList.remove('open');this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:35"></div>
<main class="cs-main">

  <div style="margin-bottom:24px" data-aos="fade-up">
    <h1 class="cs-page-title" id="doc-welcome">Good morning, Doctor</h1>
    <p class="cs-page-subtitle">Here's your schedule and patient summary for today.</p>
  </div>

  <!-- Stat Cards -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px">
    <div class="cs-stat-card" data-aos="fade-up" data-aos-delay="0">
      <div style="background:#e8f7f5;border-radius:10px;padding:10px;width:fit-content">
        <span class="material-symbols-outlined" style="color:#005c55;font-size:22px">event</span>
      </div>
      <div>
        <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#6e7977">Today's Appointments</p>
        <p style="font-size:30px;font-weight:800;color:#181c1c" id="doc-today">0</p>
      </div>
    </div>
    <div class="cs-stat-card" data-aos="fade-up" data-aos-delay="50">
      <div style="background:#fff8e6;border-radius:10px;padding:10px;width:fit-content">
        <span class="material-symbols-outlined" style="color:#d97706;font-size:22px">pending_actions</span>
      </div>
      <div>
        <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#6e7977">Pending Review</p>
        <p style="font-size:30px;font-weight:800;color:#d97706" id="doc-pending">0</p>
      </div>
    </div>
    <div class="cs-stat-card" data-aos="fade-up" data-aos-delay="100">
      <div style="background:#dbeafe;border-radius:10px;padding:10px;width:fit-content">
        <span class="material-symbols-outlined" style="color:#2563eb;font-size:22px">group</span>
      </div>
      <div>
        <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#6e7977">Total Patients</p>
        <p style="font-size:30px;font-weight:800;color:#2563eb" id="doc-patients">0</p>
      </div>
    </div>
    <div class="cs-stat-card" data-aos="fade-up" data-aos-delay="150">
      <div style="background:#f3e8ff;border-radius:10px;padding:10px;width:fit-content">
        <span class="material-symbols-outlined" style="color:#7c3aed;font-size:22px">medication</span>
      </div>
      <div>
        <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#6e7977">Prescriptions</p>
        <p style="font-size:30px;font-weight:800;color:#7c3aed" id="doc-rxs">0</p>
      </div>
    </div>
  </div>

  <!-- Chart + Pending Appointments -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
    <div class="cs-card" data-aos="fade-up">
      <h2 style="font-size:17px;font-weight:700;margin-bottom:18px">My Appointments (Last 7 Days)</h2>
      <canvas id="chart-line" height="200"></canvas>
    </div>

    <div class="cs-card" data-aos="fade-up" data-aos-delay="100">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="font-size:17px;font-weight:700">Pending Approvals</h2>
        <a href="doctor-appointments.html" class="cs-btn cs-btn-outline cs-btn-sm">View All</a>
      </div>
      <div id="pending-list" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>
  </div>

  <!-- Today's Schedule -->
  <div class="cs-card" data-aos="fade-up">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:17px;font-weight:700">Today's Schedule</h2>
      <span id="today-label" style="font-size:13px;color:#6e7977"></span>
    </div>
    <div id="today-schedule" style="display:flex;flex-direction:column;gap:12px"></div>
  </div>

</main></div>
<div id="cs-toast-container"></div>
<script src="assets/js/app.js"></script>
<script src="assets/js/demo-seed.js"></script>
<script src="assets/js/doctor.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="assets/js/aos-init.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="assets/js/charts.js"></script>
<script>
if (!guardRoute(['Doctor'])) throw new Error('Unauthorized');
DarkMode.init();
initDashboardPage({ role:'Doctor', activePage:'doctor-dashboard.html' });
document.getElementById('sidebar-toggle')?.addEventListener('click',()=>{
  const s=document.getElementById('cs-sidebar'),o=document.getElementById('sidebar-overlay');
  s.classList.toggle('open');o.style.display=s.classList.contains('open')?'block':'none';
});

const user = Auth.getSession();
const dId  = user?.linkedProfileId;
const doctor = Store.get(KEYS.DOCTORS).find(d=>d.id===dId);
document.getElementById('doc-welcome').textContent = `Good ${getGreeting()}, ${doctor?.name || user?.username}`;
document.getElementById('today-label').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'long'});

function getGreeting() {
  const h = new Date().getHours();
  return h<12?'morning':h<18?'afternoon':'evening';
}

const allApts = Store.get(KEYS.APPOINTMENTS);
const myApts  = allApts.filter(a => a.doctor_id === dId);
const today   = new Date().toDateString();
const patients= Store.get(KEYS.PATIENTS);
const rxs     = Store.get(KEYS.PRESCRIPTIONS).filter(r => r.doctor_id === dId);

const uniquePatients = [...new Set(myApts.map(a=>a.patient_id))];
document.getElementById('doc-today').textContent   = myApts.filter(a=>new Date(a.date_time).toDateString()===today).length;
document.getElementById('doc-pending').textContent  = myApts.filter(a=>a.status==='Pending').length;
document.getElementById('doc-patients').textContent = uniquePatients.length;
document.getElementById('doc-rxs').textContent     = rxs.length;

// Pending list
const pendingList = document.getElementById('pending-list');
const pending = myApts.filter(a=>a.status==='Pending').slice(0,4);
if (pending.length === 0) {
  pendingList.innerHTML = `<div class="cs-empty"><span class="material-symbols-outlined">check_circle</span><p>No pending appointments</p></div>`;
} else {
  pendingList.innerHTML = pending.map(a => {
    const pt = patients.find(p=>p.id===a.patient_id);
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px;background:#f1f4f3;border-radius:10px">
      ${avatarEl(pt?.name||'?',34)}
      <div style="flex:1">
        <p style="font-size:13px;font-weight:600">${escHtml(pt?.name||'Unknown')}</p>
        <p style="font-size:11px;color:#6e7977">${fmtDateTime(a.date_time)}</p>
      </div>
      <div style="display:flex;gap:6px">
        <button class="cs-btn cs-btn-success cs-btn-sm" onclick="updateApt('${a.id}','Approved')">✓</button>
        <button class="cs-btn cs-btn-danger cs-btn-sm" onclick="updateApt('${a.id}','Rejected')">✗</button>
      </div>
    </div>`;
  }).join('');
}

function updateApt(id, status) {
  const apts = Store.get(KEYS.APPOINTMENTS);
  const idx  = apts.findIndex(a=>a.id===id);
  if (idx>-1) { apts[idx].status = status; Store.set(KEYS.APPOINTMENTS, apts); }
  const actionMap = { Approved:'APPOINTMENT_APPROVED', Rejected:'APPOINTMENT_REJECTED' };
  logAudit(actionMap[status]||'APPOINTMENT_UPDATED','Appointment',id,`Status → ${status}`);
  showToast(`Appointment ${status.toLowerCase()}`, status==='Rejected'?'error':'success');
  setTimeout(()=>location.reload(), 700);
}

// Today schedule
const todaySchedule = document.getElementById('today-schedule');
const todayApts = myApts.filter(a=>new Date(a.date_time).toDateString()===today).sort((a,b)=>new Date(a.date_time)-new Date(b.date_time));
if (todayApts.length === 0) {
  todaySchedule.innerHTML = `<div class="cs-empty"><span class="material-symbols-outlined">event_available</span><p>No appointments scheduled today</p></div>`;
} else {
  todaySchedule.innerHTML = todayApts.map(a => {
    const pt = patients.find(p=>p.id===a.patient_id);
    return `<div style="display:flex;align-items:center;gap:14px;padding:14px;border:1px solid #f1f4f3;border-radius:10px">
      <div style="text-align:center;min-width:50px">
        <p style="font-size:16px;font-weight:800;color:#005c55">${fmtTime(a.date_time)}</p>
      </div>
      <div style="width:1px;height:40px;background:#e8eeec"></div>
      ${avatarEl(pt?.name||'?',38)}
      <div style="flex:1">
        <p style="font-size:14px;font-weight:600">${escHtml(pt?.name||'Unknown')}</p>
        <p style="font-size:12px;color:#6e7977">${escHtml(a.reason||'General')}</p>
      </div>
      ${statusBadge(a.status)}
      ${a.status==='Approved'?`<button class="cs-btn cs-btn-primary cs-btn-sm" onclick="openPrescriptionModal('${a.patient_id}','${a.id}')">+ Rx</button>`:''}
    </div>`;
  }).join('');
}

if (window.initCharts) initCharts(myApts);
</script>
<style>
@media(max-width:800px){main>div:nth-child(3){grid-template-columns:1fr!important}}
html.dark body{background:#0f1a19}html.dark .cs-main{background:#0f1a19!important}
</style>
</body></html>
