<!DOCTYPE html>
<html lang="en" class="light"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prescriptions | CareSync Doctor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
<link href="assets/css/styles.css" rel="stylesheet"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#005c55","background":"#f7faf8","surface-container-low":"#f1f4f3","on-surface":"#181c1c","on-surface-variant":"#3e4947","outline":"#6e7977"},borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem"}}}}</script>
</head>
<body class="bg-background text-on-surface">
<header class="cs-header"><div id="cs-header-inner" style="display:flex;align-items:center;gap:12px;width:100%"></div></header>
<div style="display:flex;min-height:100dvh;padding-top:64px">
<aside class="cs-sidebar" id="cs-sidebar"></aside>
<div id="sidebar-overlay" onclick="document.getElementById('cs-sidebar').classList.remove('open');this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:35"></div>
<main class="cs-main">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px" data-aos="fade-up">
    <div><h1 class="cs-page-title">Prescriptions</h1><p class="cs-page-subtitle">All prescriptions you have created for your patients.</p></div>
    <button class="cs-btn cs-btn-primary" onclick="openPrescriptionSelector()">
      <span class="material-symbols-outlined" style="font-size:18px">add</span> New Prescription
    </button>
  </div>

  <div class="cs-card" style="padding:0" data-aos="fade-up" data-aos-delay="50">
    <div style="padding:16px 20px;border-bottom:1px solid #f1f4f3">
      <div class="cs-input-icon" style="max-width:320px">
        <span class="material-symbols-outlined icon">search</span>
        <input class="cs-input" id="search-input" type="search" placeholder="Search patient or diagnosis…" style="background:#f1f4f3"/>
      </div>
    </div>
    <div id="doc-rx-table" class="cs-table-wrapper" style="border:none;border-radius:0">
      <table class="cs-table">
        <thead><tr><th>Patient</th><th>Diagnosis</th><th>Medicines</th><th>Date</th><th style="text-align:right">Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div id="doc-rx-pagination"></div>
  </div>
</main></div>
<div id="cs-toast-container"></div>
<script src="assets/js/app.js"></script>
<script src="assets/js/demo-seed.js"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/doctor.js"></script>
<script src="assets/js/pdf.js"></script>
<script src="assets/js/qr.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="assets/js/aos-init.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script>
if (!guardRoute(['Doctor'])) throw new Error('Unauthorized');
DarkMode.init();
initDashboardPage({ role:'Doctor', activePage:'doctor-prescriptions.html' });
document.getElementById('sidebar-toggle')?.addEventListener('click',()=>{
  const s=document.getElementById('cs-sidebar'),o=document.getElementById('sidebar-overlay');
  s.classList.toggle('open');o.style.display=s.classList.contains('open')?'block':'none';
});
const user = Auth.getSession();
const dId  = user?.linkedProfileId;

const tableCtrl = buildTablePage({
  containerId:'doc-rx-table', paginationId:'doc-rx-pagination', columns:5,
  searchFields:['patient_name_cache','diagnosis'],
  getData() {
    const patients = Store.get(KEYS.PATIENTS);
    return Store.get(KEYS.PRESCRIPTIONS)
      .filter(r=>r.doctor_id===dId)
      .map(r=>({...r, patient_name_cache: patients.find(p=>p.id===r.patient_id)?.name||'Unknown'}))
      .sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  },
  renderRow(r,q) {
    const meds = r.medicines.split('\n').slice(0,2).join(', ');
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px">${avatarEl(r.patient_name_cache,30)}<p style="font-size:13px;font-weight:600">${highlightText(r.patient_name_cache,q)}</p></div></td>
      <td style="font-size:13px;font-weight:600">${highlightText(r.diagnosis,q)}</td>
      <td style="font-size:12px;color:#3e4947;max-width:200px">${escHtml(meds)}${r.medicines.split('\n').length>2?'…':''}</td>
      <td style="font-size:12px;color:#6e7977">${fmtDate(r.created_at)}</td>
      <td style="text-align:right">
        <button class="cs-btn cs-btn-primary cs-btn-sm" onclick="downloadPrescriptionPDF('${r.id}')">
          <span class="material-symbols-outlined" style="font-size:14px">download</span> PDF
        </button>
      </td>
    </tr>`;
  }
});
window._tableRefresh = ()=>tableCtrl.refresh();

// Selector modal for new Rx (pick patient)
function openPrescriptionSelector() {
  const myApts = Store.get(KEYS.APPOINTMENTS).filter(a=>a.doctor_id===dId&&(a.status==='Approved'||a.status==='Completed'));
  const patients = Store.get(KEYS.PATIENTS);
  const overlay = document.createElement('div');
  overlay.className='cs-modal-overlay'; overlay.id='rx-sel-modal';
  const ptOptions = [...new Set(myApts.map(a=>a.patient_id))].map(pid=>{
    const pt=patients.find(p=>p.id===pid);
    return pt?`<option value="${pt.id}">${escHtml(pt.name)} — ${escHtml(pt.unique_patient_id)}</option>`:'';
  }).join('');
  overlay.innerHTML=`<div class="cs-modal" style="max-width:400px">
    <div class="cs-modal-header"><h3 style="font-size:18px;font-weight:700">Select Patient</h3>
      <button class="cs-btn-icon" onclick="document.getElementById('rx-sel-modal').remove()"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="cs-modal-body">
      <label class="cs-label" for="rx-sel-pt">Patient</label>
      <select class="cs-select" id="rx-sel-pt">${ptOptions||'<option value="">No eligible patients</option>'}</select>
    </div>
    <div class="cs-modal-footer">
      <button class="cs-btn cs-btn-outline" onclick="document.getElementById('rx-sel-modal').remove()">Cancel</button>
      <button class="cs-btn cs-btn-primary" onclick="const v=document.getElementById('rx-sel-pt').value;if(v){document.getElementById('rx-sel-modal').remove();openPrescriptionModal(v,null);}">Continue</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  requestAnimationFrame(()=>overlay.classList.add('open'));
}
</script>
<style>html.dark body{background:#0f1a19}html.dark .cs-main{background:#0f1a19!important}</style>
</body></html>
