<!DOCTYPE html>
<html lang="en" class="light"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Patient Dashboard | CareSync</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
<link href="assets/css/styles.css" rel="stylesheet"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#005c55","background":"#f7faf8","surface-container-low":"#f1f4f3","on-surface":"#181c1c","on-surface-variant":"#3e4947","outline":"#6e7977"},borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem"}}}}</script>
</head>
<body class="bg-background text-on-surface">
<header class="cs-header"><div id="cs-header-inner" style="display:flex;align-items:center;gap:12px;width:100%"></div></header>
<div style="display:flex;min-height:100dvh;padding-top:64px">
<aside class="cs-sidebar" id="cs-sidebar"></aside>
<div id="sidebar-overlay" onclick="document.getElementById('cs-sidebar').classList.remove('open');this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:35"></div>
<main class="cs-main">

  <!-- Welcome + Book -->
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px" data-aos="fade-up">
    <div>
      <h1 class="cs-page-title" id="pt-welcome">Welcome back</h1>
      <p class="cs-page-subtitle">Manage your appointments and view your health records.</p>
    </div>
    <button class="cs-btn cs-btn-primary" onclick="openBookingModal()">
      <span class="material-symbols-outlined" style="font-size:18px">add</span> Book Appointment
    </button>
  </div>

  <!-- Profile Card + Stats -->
  <div style="display:grid;grid-template-columns:1fr 2fr;gap:20px;margin-bottom:24px" class="pt-grid">
    <!-- Profile -->
    <div class="cs-card" data-aos="fade-up" style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px">
      <div id="pt-avatar" style="width:72px;height:72px;border-radius:50%;background:#e8f7f5;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#005c55"></div>
      <div>
        <p style="font-size:18px;font-weight:700" id="pt-name">—</p>
        <p style="font-size:12px;color:#6e7977" id="pt-uid">—</p>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;margin-top:8px">
        <div style="background:#f1f4f3;border-radius:8px;padding:8px">
          <p style="font-size:10px;font-weight:700;text-transform:uppercase;color:#6e7977;margin-bottom:2px">Age</p>
          <p style="font-size:16px;font-weight:700" id="pt-age">—</p>
        </div>
        <div style="background:#f1f4f3;border-radius:8px;padding:8px">
          <p style="font-size:10px;font-weight:700;text-transform:uppercase;color:#6e7977;margin-bottom:2px">Blood</p>
          <p style="font-size:16px;font-weight:700;color:#005c55" id="pt-blood">—</p>
        </div>
      </div>
      <div style="width:100%;text-align:left;margin-top:4px;font-size:12px;color:#6e7977">
        <p style="margin-bottom:4px"><span style="font-weight:600;color:#3e4947">Contact:</span> <span id="pt-contact">—</span></p>
        <p><span style="font-weight:600;color:#3e4947">Emergency:</span> <span id="pt-emergency">—</span></p>
      </div>
    </div>

    <!-- Stats -->
    <div style="display:flex;flex-direction:column;gap:14px" data-aos="fade-up" data-aos-delay="100">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
        <div class="cs-stat-card" style="padding:16px">
          <span class="material-symbols-outlined" style="color:#005c55;margin-bottom:6px">event</span>
          <p style="font-size:28px;font-weight:800;color:#181c1c" id="st-total">0</p>
          <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#6e7977">Total Apts</p>
        </div>
        <div class="cs-stat-card" style="padding:16px">
          <span class="material-symbols-outlined" style="color:#d97706;margin-bottom:6px">pending_actions</span>
          <p style="font-size:28px;font-weight:800;color:#d97706" id="st-pending">0</p>
          <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#6e7977">Pending</p>
        </div>
        <div class="cs-stat-card" style="padding:16px">
          <span class="material-symbols-outlined" style="color:#7c3aed;margin-bottom:6px">medication</span>
          <p style="font-size:28px;font-weight:800;color:#7c3aed" id="st-rxs">0</p>
          <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#6e7977">Prescriptions</p>
        </div>
      </div>

      <!-- Upcoming -->
      <div class="cs-card" style="padding:16px">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">Upcoming Appointments</h3>
        <div id="upcoming-list" style="display:flex;flex-direction:column;gap:8px"></div>
      </div>
    </div>
  </div>

  <!-- Recent Prescriptions -->
  <div class="cs-card" data-aos="fade-up">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:17px;font-weight:700">My Prescriptions</h2>
      <a href="patient-prescriptions.html" class="cs-btn cs-btn-outline cs-btn-sm">View All</a>
    </div>
    <div id="recent-rxs" style="display:flex;flex-direction:column;gap:10px"></div>
  </div>

</main></div>
<div id="cs-toast-container"></div>
<script src="assets/js/app.js"></script>
<script src="assets/js/demo-seed.js"></script>
<script src="assets/js/patient.js"></script>
<script src="assets/js/pdf.js"></script>
<script src="assets/js/qr.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="assets/js/aos-init.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script>
if (!guardRoute(['Patient'])) throw new Error('Unauthorized');
DarkMode.init();
initDashboardPage({ role:'Patient', activePage:'patient-dashboard.html' });
document.getElementById('sidebar-toggle')?.addEventListener('click',()=>{
  const s=document.getElementById('cs-sidebar'),o=document.getElementById('sidebar-overlay');
  s.classList.toggle('open');o.style.display=s.classList.contains('open')?'block':'none';
});

const user    = Auth.getSession();
const patient = Store.get(KEYS.PATIENTS).find(p => p.id === user?.linkedProfileId);

if (!patient) {
  document.getElementById('pt-welcome').textContent = `Welcome, ${user?.username}`;
} else {
  const initials = patient.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('pt-avatar').textContent    = initials;
  document.getElementById('pt-welcome').textContent   = `Welcome back, ${patient.name.split(' ')[0]}`;
  document.getElementById('pt-name').textContent      = patient.name;
  document.getElementById('pt-uid').textContent       = patient.unique_patient_id;
  document.getElementById('pt-age').textContent       = patient.age;
  document.getElementById('pt-blood').textContent     = patient.bloodGroup || '—';
  document.getElementById('pt-contact').textContent   = patient.contact || '—';
  document.getElementById('pt-emergency').textContent = patient.emergencyContact || '—';

  const doctors = Store.get(KEYS.DOCTORS);
  const allApts = Store.get(KEYS.APPOINTMENTS).filter(a => a.patient_id === patient.id);
  const rxs     = Store.get(KEYS.PRESCRIPTIONS).filter(r => r.patient_id === patient.id);

  document.getElementById('st-total').textContent   = allApts.length;
  document.getElementById('st-pending').textContent = allApts.filter(a=>a.status==='Pending').length;
  document.getElementById('st-rxs').textContent     = rxs.length;

  // Upcoming
  const upcomingList = document.getElementById('upcoming-list');
  const upcoming = allApts.filter(a => a.status !== 'Rejected' && new Date(a.date_time) >= new Date())
    .sort((a,b) => new Date(a.date_time)-new Date(b.date_time)).slice(0,3);
  if (upcoming.length === 0) {
    upcomingList.innerHTML = `<div class="cs-empty" style="padding:8px"><span class="material-symbols-outlined">event_available</span><p style="font-size:12px">No upcoming appointments</p></div>`;
  } else {
    upcomingList.innerHTML = upcoming.map(a => {
      const dr = doctors.find(d=>d.id===a.doctor_id);
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px;background:#f1f4f3;border-radius:8px">
        <span class="material-symbols-outlined" style="color:#005c55">event</span>
        <div style="flex:1">
          <p style="font-size:13px;font-weight:600">${escHtml(dr?.name||'Unknown')}</p>
          <p style="font-size:11px;color:#6e7977">${fmtDateTime(a.date_time)}</p>
        </div>
        ${statusBadge(a.status)}
      </div>`;
    }).join('');
  }

  // Recent Rxs
  const recentRxs = document.getElementById('recent-rxs');
  const latestRxs = rxs.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,3);
  if (latestRxs.length === 0) {
    recentRxs.innerHTML = `<div class="cs-empty"><span class="material-symbols-outlined">medication</span><p>No prescriptions yet</p></div>`;
  } else {
    recentRxs.innerHTML = latestRxs.map(r => {
      const dr = doctors.find(d=>d.id===r.doctor_id);
      return `<div style="display:flex;align-items:center;gap:14px;padding:14px;border:1px solid #f1f4f3;border-radius:10px">
        <div style="background:#f3e8ff;border-radius:10px;padding:10px;flex-shrink:0">
          <span class="material-symbols-outlined" style="color:#7c3aed">medication</span>
        </div>
        <div style="flex:1">
          <p style="font-size:14px;font-weight:700">${escHtml(r.diagnosis)}</p>
          <p style="font-size:12px;color:#6e7977">${escHtml(dr?.name||'Unknown')} · ${fmtDate(r.created_at)}</p>
          <p style="font-size:12px;color:#3e4947;margin-top:4px">${escHtml(r.medicines.split('\n')[0])}${r.medicines.split('\n').length>1?' …':''}</p>
        </div>
        <button class="cs-btn cs-btn-outline cs-btn-sm" onclick="downloadPrescriptionPDF('${r.id}')">
          <span class="material-symbols-outlined" style="font-size:14px">download</span> PDF
        </button>
      </div>`;
    }).join('');
  }
}
window._tableRefresh = ()=>location.reload();
</script>
<style>
@media(max-width:800px){.pt-grid{grid-template-columns:1fr!important}}
@media(max-width:600px){.pt-grid>div:nth-child(2)>div:first-child{grid-template-columns:1fr 1fr!important}}
html.dark body{background:#0f1a19}html.dark .cs-main{background:#0f1a19!important}
</style>
</body></html>
