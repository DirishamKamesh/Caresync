<!DOCTYPE html>
<html lang="en" class="light"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manage Patients | CareSync</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
<link href="assets/css/styles.css" rel="stylesheet"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#005c55","primary-container":"#0f766e","primary-fixed":"#9cf2e8","on-primary":"#ffffff","background":"#f7faf8","surface-container-low":"#f1f4f3","surface-container-high":"#e5e9e7","on-surface":"#181c1c","on-surface-variant":"#3e4947","outline":"#6e7977","outline-variant":"#bdc9c6","secondary":"#545f73","secondary-container":"#d5e0f8","on-secondary-container":"#586377","surface-container-lowest":"#ffffff"},borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px"},spacing:{"container-padding":"24px","stack-lg":"24px","gutter":"16px"},fontFamily:{h1:["Inter"],h2:["Inter"],"label-caps":["Inter"],"body-sm":["Inter"]},fontSize:{h1:["24px",{lineHeight:"1.3",fontWeight:"600"}],h2:["20px",{lineHeight:"1.4",fontWeight:"600"}],"label-caps":["12px",{lineHeight:"1",letterSpacing:"0.05em",fontWeight:"600"}],"body-sm":["14px",{lineHeight:"1.5",fontWeight:"400"}]}}}}</script>
</head>
<body class="bg-background text-on-surface">
<header class="cs-header"><div id="cs-header-inner" style="display:flex;align-items:center;gap:12px;width:100%"></div></header>
<div style="display:flex;min-height:100dvh;padding-top:64px">
<aside class="cs-sidebar" id="cs-sidebar"></aside>
<div id="sidebar-overlay" onclick="document.getElementById('cs-sidebar').classList.remove('open');this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:35"></div>
<main class="cs-main">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px" data-aos="fade-up">
    <div>
      <h1 class="cs-page-title">Manage Patients</h1>
      <p class="cs-page-subtitle">Create, edit, search and remove patient records.</p>
    </div>
    <button class="cs-btn cs-btn-primary" onclick="openPatientModal()">
      <span class="material-symbols-outlined" style="font-size:18px">person_add</span> Add Patient
    </button>
  </div>

  <!-- Table Card -->
  <div class="cs-card" style="padding:0" data-aos="fade-up" data-aos-delay="50">
    <!-- Toolbar -->
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:18px 20px;border-bottom:1px solid #f1f4f3">
      <div class="cs-input-icon" style="max-width:320px;flex:1">
        <span class="material-symbols-outlined icon">search</span>
        <input class="cs-input" id="search-input" type="search" placeholder="Search by name, ID, contact…" style="background:#f1f4f3"/>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:12px;color:#6e7977">Filter:</span>
        <select class="cs-select" id="gender-filter" style="width:120px;padding:8px 12px">
          <option value="">All genders</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <!-- Table -->
    <div class="cs-table-wrapper" style="border:none;border-radius:0" id="patients-table">
      <table class="cs-table">
        <thead>
          <tr>
            <th>Patient</th>
            <th>Patient ID</th>
            <th>Age / Gender</th>
            <th>Contact</th>
            <th>Blood Group</th>
            <th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div id="patients-pagination"></div>
  </div>

</main></div>
<div id="cs-toast-container"></div>

<script src="assets/js/app.js"></script>
<script src="assets/js/demo-seed.js"></script>
<script src="assets/js/admin.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="assets/js/aos-init.js"></script>
<script>
if (!guardRoute(['Admin'])) throw new Error('Unauthorized');
DarkMode.init();
initDashboardPage({ role:'Admin', activePage:'admin-patients.html' });

document.getElementById('sidebar-toggle')?.addEventListener('click',()=>{
  const s=document.getElementById('cs-sidebar'),o=document.getElementById('sidebar-overlay');
  s.classList.toggle('open');o.style.display=s.classList.contains('open')?'block':'none';
});

let genderFilter = '';
document.getElementById('gender-filter').addEventListener('change', e => { genderFilter = e.target.value; tableCtrl.refresh(); });

const tableCtrl = buildTablePage({
  containerId: 'patients-table',
  paginationId: 'patients-pagination',
  columns: 6,
  searchFields: ['name','unique_patient_id','contact'],
  getData() {
    let data = Store.get(KEYS.PATIENTS);
    if (genderFilter) data = data.filter(p => p.gender === genderFilter);
    return data;
  },
  renderRow(p, q) {
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px">${avatarEl(p.name,36)}<div><p style="font-weight:600;font-size:14px">${highlightText(p.name,q)}</p></div></div></td>
      <td><code style="font-size:12px;background:#f1f4f3;padding:3px 7px;border-radius:5px;color:#005c55">${escHtml(p.unique_patient_id)}</code></td>
      <td style="font-size:13px">${escHtml(p.age)} / ${escHtml(p.gender)}</td>
      <td style="font-size:13px;color:#3e4947">${highlightText(p.contact||'—',q)}</td>
      <td><span style="font-size:12px;font-weight:600;color:#005c55">${escHtml(p.bloodGroup||'—')}</span></td>
      <td style="text-align:right">
        <div style="display:flex;gap:4px;justify-content:flex-end">
          <button class="cs-btn-icon" title="Edit" onclick="openPatientModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">
            <span class="material-symbols-outlined" style="font-size:18px">edit</span>
          </button>
          <button class="cs-btn-icon" title="Delete" onclick="deletePatient('${p.id}')" style="color:#ba1a1a">
            <span class="material-symbols-outlined" style="font-size:18px">delete</span>
          </button>
        </div>
      </td>
    </tr>`;
  }
});

window._tableRefresh = () => tableCtrl.refresh();
</script>
<style>html.dark body{background:#0f1a19}html.dark .cs-main{background:#0f1a19!important}</style>
</body></html>
